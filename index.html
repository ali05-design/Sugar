<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitterSweet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 1. Black out the background and center everything */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Force the canvas to scale responsively while keeping aspect ratio */
        canvas {
            display: block;
            /* The !important tags override p5.js's hardcoded inline styles */
            max-width: 100vw !important;
            max-height: 100vh !important;
            width: auto !important;
            height: auto !important;
            /* Ensures it fits perfectly inside the screen bounds */
            object-fit: contain; 
        }
    </style>
</head>
<body>
    <script src="sketch.js"></script>
</body>
</html>
