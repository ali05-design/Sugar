<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitterSweet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 1. Force the absolute base of the page to be black */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000 !important;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Target the invisible wrapper p5.js sometimes generates */
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background-color: #000 !important;
            margin: 0;
            padding: 0;
        }

        /* 3. Strip all outlines, borders, and force the canvas to scale */
        canvas {
            display: block;
            max-width: 100vw !important;
            max-height: 100vh !important;
            width: auto !important;
            height: auto !important;
            object-fit: contain;
            
            /* The border killers */
            outline: none !important; 
            border: none !important;  
            box-shadow: none !important;
        }

        /* 4. Ensure the browser's native fullscreen empty space is black */
        ::backdrop {
            background-color: #000 !important;
        }
    </style>
</head>
<body>
    <script src="sketch.js"></script>
</body>
</html>
